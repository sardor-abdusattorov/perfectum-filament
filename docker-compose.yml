services:
  nginx:
    image: nginx:1.27-alpine
    container_name: perfectum-nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api/public:/var/www/api/public:ro
      - ./api/storage/app/public:/var/www/api/public/storage:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: perfectum-php
    volumes:
      - ./api:/var/www/api
      - vendor_data:/var/www/api/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - api/.env
    environment:
      INIT_PROJECT: ${INIT_PROJECT:-0}
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped
    mem_limit: 768m

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: perfectum-scheduler
    command: php artisan schedule:work
    volumes:
      - ./api:/var/www/api
      - vendor_data:/var/www/api/vendor
    depends_on:
      php:
        condition: service_started
    env_file:
      - api/.env
    networks:
      - app-network
    restart: unless-stopped
    mem_limit: 256m

  node:
    image: node:24-alpine
    container_name: perfectum-node
    working_dir: /app
    command: sh -c "[ -d node_modules/nuxt ] || npm install --no-audit --no-fund; npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
      - "24678:24678"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_HMR_HOST: "localhost"
      VITE_HMR_PORT: 24678
    networks:
      - app-network
    restart: unless-stopped
    mem_limit: 1g

  postgres:
    image: postgres:16-alpine
    container_name: perfectum-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-perfectum}
      POSTGRES_USER: ${DB_USERNAME:-perfectum}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-perfectum} -d ${DB_DATABASE:-perfectum}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped
    mem_limit: 512m

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: perfectum-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    mem_limit: 256m

  redis:
    image: redis:7-alpine
    container_name: perfectum-redis
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    mem_limit: 128m

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  node_modules:
  vendor_data: