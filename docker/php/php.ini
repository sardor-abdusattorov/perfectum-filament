; ---- Dev limits (deliberately generous) ----
memory_limit = 2048M
upload_max_filesize = 1024M
post_max_size = 1024M
max_execution_time = 600
max_input_time = 600
max_input_vars = 10000
default_socket_timeout = 600
date.timezone = Asia/Tashkent
expose_php = Off

; ---- Realpath cache ----
realpath_cache_size = 16M
realpath_cache_ttl = 600

; ---- Error reporting (dev) ----
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; ---- OPcache ----
; validate_timestamps=1 + revalidate_freq=0 → opcache rechecks files on
; every request so edits show up immediately in dev. Flip validate_timestamps
; to 0 in prod for full speed.
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 50000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.save_comments = 1
opcache.enable_file_override = 0

; ---- JIT ----
opcache.jit_buffer_size = 256M
opcache.jit = tracing
